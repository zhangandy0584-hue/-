name: Daily Price Scraper

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 (相当于北京时间早上 8:00)
    - cron: '0 0 * * *'
  # 允许手动点击按钮触发（方便测试）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 赋予写入权限，这样才能更新 data.json

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Run Scraper
      run: |
        python scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        git commit -m "Auto-update daily price data" || echo "No changes to commit"
        git push
